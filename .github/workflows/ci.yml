name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: flake8 app.py test_app.py

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest test_app.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show who is deploying
        env:
          USERNAME: ${{ secrets.MY_USERNAME }}
        run: echo "Deploying as user $USERNAME"

      - name: Check secret is not empty
        env:
          PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: |
          if [ -z "$PASSWORD" ]; then
            echo "ERROR: password is empty!"
            exit 1
          else
            echo "Password is set correctly (hidden)"
          fi
